# V8.9 — Smoke test prod routes after Vercel deploy
# Runs every 6h and on manual trigger. Pings critical routes, fails on 5xx.

name: Smoke prod

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit critical routes
        run: |
          set -e
          BASE="https://cadence-api-ruddy.vercel.app"
          ROUTES=("/" "/calendar" "/posts" "/posts/new" "/suggestions" "/sources" "/sources/notion" "/sources/linkedin" "/cerveau" "/analytics" "/brand-dna" "/design-visuel" "/inspirations" "/settings" "/api/health" "/api/insights" "/api/content-items?limit=1")
          FAILED=0
          for r in "${ROUTES[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE$r" || echo "000")
            # 200, 307 (redirect), 308 are OK ; 401/403 OK pour API auth ; 404 OK pour health si pas branché
            if [[ "$code" =~ ^(200|3..|401|403|404)$ ]]; then
              echo "✓ $r → $code"
            else
              echo "❌ $r → $code"
              FAILED=$((FAILED+1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED route(s) failed"
            exit 1
          fi
