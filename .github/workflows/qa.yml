name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  qa:
    name: Build + typecheck + mojibake
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next build
        run: npm run build
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: example
          SUPABASE_ANON_KEY: example
          MASTER_ENCRYPTION_KEY: "00000000000000000000000000000000"
          NOTION_API_TOKEN: example
          NOTION_LINKEDIN_DS_ID: example
          LINKEDIN_CLIENT_ID: example
          LINKEDIN_CLIENT_SECRET: example
          LINKEDIN_REDIRECT_URI: http://localhost:3000/api/auth/callback
          CRON_SECRET: example
          COCKPIT_SECRET: example

      - name: Scan mojibake
        run: node scripts/scan-mojibake.mjs

      - name: Required files exist
        run: |
          for f in app/page.tsx app/posts/new/client.tsx components/CadenceEditor.tsx lib/radar.ts lib/embeddings.ts CLAUDE.md; do
            test -f "$f" || (echo "Missing $f" && exit 1)
          done
